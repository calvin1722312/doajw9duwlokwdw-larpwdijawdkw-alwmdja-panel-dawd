<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Angeles Staff Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h2>Staff Network</h2>
            <p>Please enter your access details below</p>
            <div class="error-msg" id="loginError">Invalid credentials. Try again.</div>
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUser" placeholder="Enter username..." autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="Enter password..." autocomplete="off" required>
                </div>
                <button type="submit" class="btn-action">Login to Console</button>
            </form>
        </div>
    </div>

    <div id="mainSystem">
        <div class="system-wrapper">
            <div class="sidebar">
                <div>
                    <div class="brand">
                        <h1>Los Angeles</h1>
                        <span>Staff Center</span>
                    </div>
                    <ul class="nav-links">
                        <li><div id="navConsole" class="nav-item active">🛠️ Incident Form</div></li>
                    </ul>
                </div>
                <div class="user-profile">
                    <div class="profile-info">
                        <p id="activeUserDisplay">Admin Core</p>
                        <span id="activeRankDisplay">Foundership Team</span>
                    </div>
                    <button id="btnLogout" class="btn-logout">🚪 Logout</button>
                </div>
            </div>

            <div class="main-workspace">
                <div class="header">
                    <h2 id="viewTitle">Incident Form</h2>
                    <div class="status-badge"><div class="pulse-dot"></div>CONNECTED TO SERVICES</div>
                </div>

                <div id="viewConsoleLayer" class="view-layer active-view">
                    <div class="grid-layout" style="grid-template-columns: 1fr; max-width: 800px; margin: 0 auto;">
                        <div class="melony-card">
                            <h3>Log New Infraction</h3>
                            <form id="incidentForm" autocomplete="off">
                                <div class="form-group">
                                    <label>Player Roblox Username</label>
                                    <input type="text" id="username" placeholder="Type username..." autocomplete="off" required>
                                </div>
                                <div class="form-group">
                                    <label>Action Taken</label>
                                    <select id="action">
                                        <option value="Note">Note</option>
                                        <option value="Warning">Warning</option>
                                        <option value="Kick">Kick</option>
                                        <option value="Temp Ban">Temp Ban</option>
                                        <option value="Ban Bolo">Ban Bolo (Any Rank)</option>
                                        <option value="Ban" id="optAdminBan">Ban (Admin+ Only)</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Rule Violated</label>
                                    <input type="text" id="reason" placeholder="Type specific broken rule here..." autocomplete="off" required>
                                </div>
                                <div class="form-group">
                                    <label>Notes / Proof Links</label>
                                    <textarea id="notes" rows="4" placeholder="Enter proof links or details..." autocomplete="off"></textarea>
                                </div>
                                <button type="submit" class="btn-action">Save Log Entry</button>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
